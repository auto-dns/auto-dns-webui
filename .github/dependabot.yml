version: 2
updates:
  # Backend Go modules
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "chore(deps)"
    # Collapse a cycle's worth of minor/patch bumps into one PR (one shared
    # go.mod/go.sum). Majors stay as individual PRs for review.
    groups:
      backend-deps:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      # Bundle security fixes that surface together into one PR, rather than
      # one PR per advisory (security updates ignore schedule and the PR limit).
      backend-security:
        applies-to: security-updates
        patterns:
          - "*"

  # Frontend npm packages
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "chore(deps)"
    # Collapse a cycle's worth of minor/patch bumps into one PR (one shared
    # package.json/package-lock.json). Majors stay as individual PRs for review.
    groups:
      frontend-deps:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      # Bundle security fixes that surface together into one PR, rather than
      # one PR per advisory (security updates ignore schedule and the PR limit).
      frontend-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      # ESLint 10 is blocked upstream: eslint-plugin-react (latest 7.37.5)
      # only declares peer support up to eslint ^9.7, so `npm ci`/lint cannot
      # resolve with eslint 10. Hold the major bumps until the plugin ships
      # eslint-10 support, then drop these ignores. Minor/patch still flow.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
    # Collapse all action bumps into a single PR.
    groups:
      ci-deps:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      # Bundle security fixes that surface together into one PR, rather than
      # one PR per advisory (security updates ignore schedule and the PR limit).
      ci-security:
        applies-to: security-updates
        patterns:
          - "*"
