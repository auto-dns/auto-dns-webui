version: 2
updates:
  # Backend Go modules
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "chore(deps)"
    # Collapse a cycle's worth of minor/patch bumps into one PR (one shared
    # go.mod/go.sum). Majors stay as individual PRs for review.
    groups:
      backend-deps:
        update-types:
          - minor
          - patch

  # Frontend npm packages
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "chore(deps)"
    # Collapse a cycle's worth of minor/patch bumps into one PR (one shared
    # package.json/package-lock.json). Majors stay as individual PRs for review.
    groups:
      frontend-deps:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
    # Collapse all action bumps into a single PR.
    groups:
      ci-deps:
        update-types:
          - minor
          - patch
